<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Calculadora OC Web</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-lockup">
        <img class="brand-logo" src="/static/images/logo.png" alt="DEVs Project" />
        <div class="brand-copy">
          <h1>calculadora oc</h1>
        </div>
      </div>

      <nav class="tabs-shell" aria-label="Secciones de la app">
        <button
          id="tabs-menu-btn"
          class="tabs-menu-btn"
          type="button"
          aria-controls="tabs"
          aria-expanded="false"
          aria-label="Abrir menu de secciones"
        >
          <span class="tabs-menu-label">Menu</span>
          <span class="tabs-menu-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>

        <div class="tabs" id="tabs">
          <button class="tab active" data-tab="calc">Calculadora</button>
          <button class="tab" data-tab="nc2nc">NC -> NC</button>
          <button class="tab" data-tab="nc2cs">NC -> CS</button>
          <button class="tab" data-tab="suma">Suma NC</button>
        </div>
      </nav>
    </header>

    <main class="content">
      <section class="panel active" id="panel-calc">
        <h2>Calculadora de Conversion</h2>

        <div class="calc-entry-row">
          <label class="grow">Entrada <input id="calc-numero" type="text" placeholder="Escribe un numero" /></label>
          <label>Base
            <select id="calc-base-origen">
                <option value="10">DEC(10)</option>
                <option value="2">BIN(2)</option>
                <option value="16">HEX(16)</option>
                <option value="8">OCT(8)</option>
            </select>
          </label>
          <button id="calc-options-btn" class="detail-btn calc-options-trigger calc-options-btn-compact" type="button" aria-label="Abrir opciones de conversion">
            <span class="opts-icon">⚙</span>
            <span class="opts-text">Opciones</span>
            <span id="calc-options-badge" class="opts-badge"></span>
          </button>
        </div>

        <dialog id="calc-options-modal" class="rounding-modal calc-options-modal" aria-label="Opciones de conversion">
          <div class="rounding-modal-card calc-options-modal-card">
            <div class="rounding-modal-header">
              <h3>Opciones de conversion</h3>
              <button id="calc-options-close" class="modal-close-btn" type="button" aria-label="Cerrar">×</button>
            </div>
            <div class="rounding-modal-body calc-options-modal-body">
              <label class="inline toggle-btn"><input id="calc-complemento" type="checkbox" /> Aplicar complemento</label>
              <label class="inline toggle-btn"><input id="calc-entrada-comp" type="checkbox" /> Valor ya complementado</label>
              <button id="rounding-modal-btn" class="detail-btn calc-modal-btn" type="button">Redondeo</button>
              <fieldset id="nc-fijo-group" class="nc-fijo-options" style="border: 1px solid #ccd1d8; padding: 10px; border-radius: 6px; margin: 8px 0;">
                <legend style="padding: 0 8px; font-weight: 600; font-size: 0.9rem;">
                  <label class="inline toggle-btn"><input id="calc-nc-fijo" type="checkbox" /> NC fijo</label>
                </legend>
                <label>Base NC
                  <select id="calc-base-nc">
                    <option value="10">DEC(10)</option>
                    <option value="2">BIN(2)</option>
                    <option value="16">HEX(16)</option>
                    <option value="8">OCT(8)</option>
                  </select>
                </label>
                <label>E <input id="calc-e" type="number" min="1" max="32" value="5" /></label>
                <label>F <input id="calc-f" type="number" min="0" max="16" value="2" /></label>
              </fieldset>
              <label>Sep.
                <select id="calc-separador">
                  <option value=",">,</option>
                  <option value=".">.</option>
                </select>
              </label>
            </div>
          </div>
        </dialog>

        <dialog id="rounding-modal" class="rounding-modal" aria-label="Opciones de redondeo">
          <div class="rounding-modal-card">
            <div class="rounding-modal-header">
              <h3>Redondeo</h3>
              <button id="rounding-modal-close" class="modal-close-btn" type="button" aria-label="Cerrar">×</button>
            </div>
            <div class="rounding-modal-body">
              <label class="inline toggle-btn"><input id="calc-redondear" type="checkbox" checked /> Redondear</label>
              <label>Fracciones <input id="calc-precision" type="number" min="0" max="16" value="4" /></label>
            </div>
          </div>
        </dialog>



        <div class="calc-main-grid">
          <div class="calc-outputs">
            <div class="out-row">
              <span class="tag dec">DEC</span>
              <input id="out-dec" readonly />
              <button class="usar-btn" data-out="DEC">Usar</button>
            </div>
            <div class="out-row">
              <span class="tag bin">BIN</span>
              <input id="out-bin" readonly />
              <button class="usar-btn" data-out="BIN">Usar</button>
            </div>
            <div class="out-row">
              <span class="tag hex">HEX</span>
              <input id="out-hex" readonly />
              <button class="usar-btn" data-out="HEX">Usar</button>
            </div>
            <div class="out-row">
              <span class="tag oct">OCT</span>
              <input id="out-oct" readonly />
              <button class="usar-btn" data-out="OCT">Usar</button>
            </div>
          </div>

          <div class="calc-keypad">
            <button class="key" data-key="A">A</button>
            <button class="key" data-key="B">B</button>
            <button class="key" data-key="C">C</button>
            <button class="key action" data-key="DEL">DEL</button>

            <button class="key" data-key="D">D</button>
            <button class="key" data-key="E">E</button>
            <button class="key" data-key="F">F</button>
            <button class="key action" data-key="AC">AC</button>

            <button class="key" data-key="7">7</button>
            <button class="key" data-key="8">8</button>
            <button class="key" data-key="9">9</button>
            <button class="key action" data-key="/">/</button>

            <button class="key" data-key="4">4</button>
            <button class="key" data-key="5">5</button>
            <button class="key" data-key="6">6</button>
            <button class="key action" data-key="*">*</button>

            <button class="key" data-key="1">1</button>
            <button class="key" data-key="2">2</button>
            <button class="key" data-key="3">3</button>
            <button class="key action" data-key="-">-</button>

            <button class="key" data-key=",">,</button>
            <button class="key" data-key="0">0</button>
            <button class="key action" data-key="+">+</button>
            <button class="key action" data-key="=">=</button>
          </div>
        </div>

        <div id="calc-status" class="calc-toast" aria-live="polite"></div>
      </section>

      <section class="panel" id="panel-nc2nc">
        <h2>NC fijo -> NC fijo</h2>
        <div class="grid">
          <label>Entrada comp. <input id="nc2nc-numero" type="text" placeholder="Ej: 1F4A2,5C93" /></label>
          <label>Base origen <input id="nc2nc-bo" type="number" min="2" max="36" value="16" /></label>
          <label>E origen <input id="nc2nc-eo" type="number" min="1" value="5" /></label>
          <label>F origen <input id="nc2nc-fo" type="number" min="0" value="4" /></label>
          <label>Base destino <input id="nc2nc-bd" type="number" min="2" max="36" value="8" /></label>
          <label>E destino <input id="nc2nc-ed" type="number" min="1" value="6" /></label>
          <label>F destino <input id="nc2nc-fd" type="number" min="0" value="3" /></label>
          <label>Separador
            <select id="nc2nc-sep">
              <option value=",">,</option>
              <option value=".">.</option>
            </select>
          </label>
        </div>
        <button id="nc2nc-run">Convertir NC -> NC</button>
        <pre id="nc2nc-out" class="output"></pre>
      </section>

      <section class="panel" id="panel-nc2cs">
        <h2>NC -> CS (signo 0/1)</h2>
        <div class="grid">
          <label>Entrada comp. <input id="nc2cs-numero" type="text" placeholder="Ej: 1F4A2,5C93" /></label>
          <label>Base <input id="nc2cs-base" type="number" min="2" max="36" value="16" /></label>
          <label>E <input id="nc2cs-e" type="number" min="1" value="5" /></label>
          <label>F <input id="nc2cs-f" type="number" min="0" value="4" /></label>
          <label>Separador
            <select id="nc2cs-sep">
              <option value=",">,</option>
              <option value=".">.</option>
            </select>
          </label>
        </div>
        <button id="nc2cs-run">Convertir NC -> CS</button>
        <pre id="nc2cs-out" class="output"></pre>
      </section>

      <section class="panel" id="panel-suma">
        <h2>Operaciones NC</h2>
        <div class="grid">
          <label>N1 (comp.) <input id="suma-n1" type="text" /></label>
          <label>N2 (comp.) <input id="suma-n2" type="text" /></label>
          <label>Base <input id="suma-base" type="number" min="2" max="36" value="10" /></label>
          <label>E <input id="suma-e" type="number" min="1" value="5" /></label>
          <label>F <input id="suma-f" type="number" min="0" value="2" /></label>
          <label>Operacion
            <select id="suma-op">
              <option value="suma">N1 + N2</option>
              <option value="resta">N1 - N2 (N1 + N2!)</option>
            </select>
          </label>
          <label>Separador
            <select id="suma-sep">
              <option value=",">,</option>
              <option value=".">.</option>
            </select>
          </label>
        </div>
        <button id="suma-run">Calcular</button>
        <pre id="suma-out" class="output"></pre>
      </section>

    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
